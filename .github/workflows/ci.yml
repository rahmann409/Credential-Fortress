name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
    - name: Lint with ruff
      run: |
        ruff check .
    - name: Type check with mypy
      run: |
        mypy credential_fortress/
    - name: Test with pytest
      run: |
        pytest tests/ --cov=credential_fortress --cov-fail-under=80
    - name: Integration Dry Run
      run: |
        # Create a mock scenario file and run dry-run to ensure no crash
        mkdir -p data
        echo "password123" > data/mock_scenario.txt
        # python fortress.py --scenario data/mock_scenario.txt --dry-run (to be implemented)
